; Enigma configuration format v1
; Global format metadata.
[CONFIG]

FormatVersion=1

; Define alphabets first as they are referenced by rotors and machines.
[ALPHABETS]

NewAlphabet
Id=1
Name=Standard English
Size=26
SymbolMap=ABCDEFGHIJKLMNOPQRSTUVWXYZ

; Define shared rotor catalog.
; Notches may be letters (Q) or numeric indexes (16).
; AlphabetId references an alphabet defined in [ALPHABETS].
[ROTORS]

NewRotor
Id=1
Name=Rotor I
AlphabetId=1
Wiring=EKMFLGDQVZNTOWYHXUSPAIBRCJ
Notches=Q


NewRotor
Id=2
Name=Rotor II
AlphabetId=1
Wiring=AJDKSIRUXBLHWTMCQGZNPYFVOE
Notches=25


NewRotor
Id=3
Name=Rotor III
AlphabetId=1
Wiring=BDFHJLCPRTXVZNYEIWGAKMUSQO
Notches=V

; Each NewMachine defines one selectable Enigma machine profile.
; Reflectors are defined INSIDE each machine.
; Reflectors available for a machine are exactly the NewReflector blocks in that machine.
[MACHINES]

NewMachine
Id=1
Name=Enigma M3 Dummy
; AlphabetId references an alphabet defined in [ALPHABETS].
AlphabetId=1
; RotorCount is how many active stepping rotors are used for this machine.
RotorCount=3
; AvailableRotors references [ROTORS] Id values.
AvailableRotors=1,2,3
; EntryWheel is ETW wiring.
EntryWheel=ABCDEFGHIJKLMNOPQRSTUVWXYZ
; DefaultReflector selects one NewReflector Id from this machine block.
DefaultReflector=1
NewReflector
Id=1
Name=UKW B
Wiring=YRUHQSLDPXNGOKMIEBFZCWVJAT
Rotates=false
Rewirable=false
Thin=false
NewReflector
Id=2
Name=UKW C
Wiring=FVPJIAOYEDRZXWGCTKSQUBNMHL
Rotates=false
Rewirable=false
Thin=false
; Plugboard=true means machine supports stecker pair-swaps.
Plugboard=true
ReflectorAdvances=false
; SteppingModel is parser/runtime-defined behavior id.
SteppingModel=1
[DESCRIPTION]
Dummy machine profile for parser v1.
Long text here is optional runtime metadata and may be skipped in low-memory targets.
[/DESCRIPTION]

NewMachine
Id=2
Name=Enigma Variant Dummy
; AlphabetId references an alphabet defined in [ALPHABETS].
AlphabetId=1
; RotorCount is how many active stepping rotors are used for this machine.
RotorCount=3
AvailableRotors=2,3,1
EntryWheel=ABCDEFGHIJKLMNOPQRSTUVWXYZ
DefaultReflector=2
NewReflector
Id=1
Name=UKW B
Wiring=YRUHQSLDPXNGOKMIEBFZCWVJAT
Rotates=false
Rewirable=false
Thin=false
NewReflector
Id=2
Name=UKW C Rotatable Dummy
Wiring=FVPJIAOYEDRZXWGCTKSQUBNMHL
Rotates=true
Rewirable=true
Thin=true
Plugboard=false
ReflectorAdvances=false
SteppingModel=2
[DESCRIPTION]
Second machine entry used to exercise parser paths.
This variant intentionally flips several booleans so default handling can be tested.
[/DESCRIPTION]
